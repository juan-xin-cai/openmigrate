name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: CGO_ENABLED=0 go test -count=1 ./...

  package-dry-run:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Dry-run macOS release package
        run: |
          VERSION="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}" \
          DIST_ROOT="$RUNNER_TEMP/dist" \
          ./scripts/release-macos.sh
